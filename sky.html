<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藍天白雲電動車出租 | LINE 聯絡資訊</title>
    <style>
        :root {
            --primary-blue: #1e88e5; /* 藍天藍 */
            --bg-color: #f7fbff; /* 淺藍，仿白雲天色 */
            --text-dark: #333;
            --accent-green: #06C755; /* LINE 官方綠色 */
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.5;
            display: flex;
            justify-content: center;
        }

        .phone-frame {
            width: 100%;
            max-width: 480px; /* 針對手機版最佳化 */
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 頂部 Header */
        .header {
            position: relative;
            background-color: var(--primary-blue);
            color: white;
            text-align: center;
            padding: 45px 20px;
            overflow: hidden;
        }
        
        /* 雲朵背景裝飾 */
        .header::after {
            content: '';
            position: absolute;
            top: 20px; right: 20px;
            width: 80px; height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            box-shadow: -60px 20px 0 rgba(255,255,255,0.1), -110px 10px 0 rgba(255,255,255,0.15);
        }

        .header-logo {
            width: 85px; /* 預留給你的專屬設計 Logo */
            height: auto;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 15px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* 店面元素區：精選實景照片與經典紅布條 */
        .store-elements {
            background: white;
            padding: 25px 20px 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .store-photo-strip {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .store-photo {
            width: 100%;
            height: 95px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        /* 經典紅布條：融合店內最吸睛的超值服務 */
        .banner-strip {
            width: 100%;
            background-color: #ff4747; 
            color: white;
            padding: 12px 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
        }

        /* 核心 LINE 行動區 (CTA) */
        .cta-section {
            padding: 35px 20px;
            text-align: center;
            background: #fafafa;
        }

        .cta-tagline {
            font-size: 16px;
            color: #555;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* 醒目的 LINE 按鈕 */
        .line-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent-green);
            color: white;
            text-decoration: none;
            padding: 16px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(6, 199, 85, 0.35);
            transition: all 0.2s ease;
        }

        .line-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(6, 199, 85, 0.2);
        }

        .line-btn-icon {
            width: 26px;
            height: 26px;
            margin-right: 10px;
            fill: white;
        }

        /* 說明資訊區 */
        .info-section {
            flex-grow: 1;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #eee;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }

        .info-card h3 {
            font-size: 17px;
            color: var(--primary-blue);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .info-card p {
            font-size: 14px;
            color: #666;
        }

        /* 底部 */
        .footer {
            background-color: white;
            border-top: 1px solid #eee;
            padding: 25px;
            text-align: center;
            font-size: 13px;
            color: #999;
        }
        
        .footer-logo {
            width: 45px;
            height: auto;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .fb-link {
            color: var(--primary-blue);
            font-weight: 600;
            text-decoration: none;
            margin-top: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <!-- 頂部招牌與 LOGO 區 -->
        <header class="header">
            <!-- 專屬設計 Logo 檔案 -->
            <img src="logo.png" alt="藍天白雲 LOGO" class="header-logo">
            <h1>藍天白雲電動車出租</h1>
            <p>節能環保・低碳旅遊・輕鬆啟程</p>
        </header>

        <!-- 在地店面元素區 -->
        <section class="store-elements">
            <!-- 照片牆：對應您剛剛轉換完成的實景 JPG 照片 -->
            <div class="store-photo-strip">
                <div class="store-photo" style="background-image: url('IMG_3948.jpg');"></div> 
                <div class="store-photo" style="background-image: url('IMG_3947.jpg');"></div> 
                <div class="store-photo" style="background-image: url('IMG_3942.jpg');"></div> 
            </div>
            
            <!-- 店面紅布條核心亮點 -->
            <div class="banner-strip">
                暢遊伯朗大道 ‧ 租電動車免停車費
            </div>
        </section>

        <!-- 核心 LINE 行動區 (CTA) -->
        <section class="cta-section">
            <p class="cta-tagline">專業客服線上 1 對 1 諮詢，立即預約保留車款</p>
            
            <a href="https://lin.ee/nxhpkp2" class="line-btn" target="_blank">
                <svg class="line-btn-icon" viewBox="0 0 24 24">
                    <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.121.303.079.778.039 1.085l-.171 1.025c-.053.303-.254 1.186 1.093.647 1.348-.539 7.274-4.283 9.922-7.33 1.932-2.126 2.024-4.249 2.024-5.367zm-15.632 2.52h-1.52v-3.722h1.52v3.722zm3.038 0h-1.464l-1.637-2.316v2.316h-1.46v-3.722h1.464l1.637 2.316v-2.316h1.46v3.722zm1.752-1.396h1.614v1.396h-3.134v-3.722h3.134v1.396h-1.614v.364h1.614v1.002h-1.614v.564zm4.212 1.396h-3.134v-3.722h1.52v2.326h1.614v1.396z"/>
                </svg>
                點我加 LINE 立即預約
            </a>
        </section>

        <!-- 說明資訊區 -->
        <section class="info-section">
            <div class="info-card">
                <h3>⚡ 多款彩色車型・車況極佳</h3>
                <p>提供多款全新遮陽電動車與多色造型機車，出發前電力滿載，平順、安全又好騎。</p>
            </div>
            <div class="info-card">
                <h3>💼 預約留車・到店即刻出發</h3>
                <p>線上預約享好康，現場交車快速免排隊，不浪費您在伯朗大道的任何一秒美景。</p>
            </div>
        </section>

        <!-- 底部聲明與 FB 連結 -->
        <footer class="footer">
            <img src="logo.png" alt="藍天白雲 LOGO" class="footer-logo">
            <p>© 2026 藍天白雲電動車出租 版權所有</p>
            <a href="https://www.facebook.com/p/%E8%97%8D%E5%A4%A9%E7%99%BD%E9%9B%B2%E9%9B%BB%E5%8B%95%E8%BB%8A%E5%87%BA%E7%A7%9F-61581143634270/" target="_blank" class="fb-link">追蹤我們的 Facebook 粉絲專頁</a>
        </footer>
    </div>

</body>
</html>
